apiVersion: apps/v1
kind: Deployment
metadata:
  name: pvtest
  labels:
    app: pvtest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pvtest
  template:
    metadata:
      labels:
        app: pvtest
    spec:
      containers:
        - name: pvtest
          image: yklee2002/pvtest:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/bookdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "root1234"

---
apiVersion: v1
kind: Service
metadata:
  name: pvtest
spec:
  type: NodePort
  selector:
    app: pvtest
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30102

